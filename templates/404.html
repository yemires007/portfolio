{% extends "base.html" %}

{% block title %}Not found — {{ profile.name }}{% endblock %}

{% block body %}
<section class="wrap" style="padding:120px 0;text-align:center">
  <span class="eyebrow" style="justify-content:center">Error 404</span>
  <h1 style="font-family:var(--display);font-weight:600;font-size:clamp(34px,6vw,60px);margin:18px 0 14px">This page wandered off.</h1>
  <p style="color:var(--ink-soft);max-width:46ch;margin:0 auto 28px">The page you were looking for doesn't exist — it may have moved, or the link was mistyped.</p>
  <a class="btn btn-solid" href="{{ url_for('index') }}">← Back home</a>
</section>
{% endblock %}
